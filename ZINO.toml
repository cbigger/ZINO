# ZINO.toml — main configuration file

[api]
base_url = "https://openrouter.ai/api/v1"   # or any OpenAI-compatible endpoint
key      = ""

[logging]
level = "DEBUG"

[service]
model = "openrouter/auto"

[agent]
temperature    = 0.7
top_p          = 1.0
max_iterations = 5                   # max tool/skill execution loops per request

[daemon]
socket = "/run/zino/daemon.sock"

[rtr]
socket    = "/run/zino/rtr.sock"
streaming = true

[exc]
socket  = "/run/zino/exc.sock"
timeout = 30                         # execution timeout in seconds

[ctx]
socket            = "/run/zino/ctx.sock"
history_limit     = 50               # max chat history messages to include
hard_memory_top_k = 3                # number of hard memory results per search
data_dir          = "data/mem"       # persistent storage for histories and memories
template          = "agents/SYSTEM.md"      # Template loaded from working directory
personality       = ""               # optional personality text for %%PERSONALITY%%
soft_memory       = ""               # initial soft memory for %%SOFT_MEMORIES%%
inject_history         = true        # include chat history in context (default true)
inject_hard_memories   = false       # include hard memories in context (default false)
inject_tool_examples   = false       # include tool exampels in context (default false)
inject_skill_examples  = false       # include skill examples in context (default false)

[tools]
dir = "agents/tools"

[skills]
dir = "agents/skills"
